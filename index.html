<head>

    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ff6b9d, #ffd93d, #6bcb77, #4d96ff, #ff6b9d);

      font-family: 'Nunito', sans-serif;
      overflow-x: hidden;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    canvas#confetti {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
      background: rgba(255,255,255,0.93);
      border-radius: 32px;
      padding: 44px 32px 36px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.15);
      margin-bottom: 28px;
    }

    .emoji-row {
      font-size: 2.6rem;
      letter-spacing: 8px;
      margin-bottom: 14px;
      animation: bounce 1.5s infinite alternate;
    }

    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-10px); }
    }

    .hero h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2.4rem, 8vw, 4.2rem);
      color: #ff4d8b;
      text-shadow: 3px 3px 0 #ffd93d;
      line-height: 1.1;
      margin-bottom: 10px;
    }

    .hero .subtitle {
      font-size: 1.1rem;
      color: #666;
      font-weight: 600;
      margin-top: 8px;
    }

    /* ── Quiz Card ── */
    .quiz-card {
      background: rgba(255,255,255,0.95);
      border-radius: 28px;
      padding: 36px 32px;
      box-shadow: 0 6px 40px rgba(0,0,0,0.13);
    }

    /* Progress */
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .progress-label {
      font-size: 0.9rem;
      font-weight: 800;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .score-label {
      font-size: 0.9rem;
      font-weight: 800;
      color: #6bcb77;
    }

    .progress-bar-wrap {
      background: #f0f0f0;
      border-radius: 99px;
      height: 10px;
      margin-bottom: 28px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #ff6b9d, #ffd93d);
      transition: width 0.4s ease;
    }

    /* Question */
    .question-num {
      font-family: 'Fredoka One', cursive;
      font-size: 0.95rem;
      color: #bbb;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .question-text {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.2rem, 3.5vw, 1.55rem);
      color: #222;
      line-height: 1.4;
      margin-bottom: 28px;
    }

    /* Options */
    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option-btn {
      background: #f8f8ff;
      border: 2.5px solid #e8e8f0;
      border-radius: 16px;
      padding: 16px 20px;
      font-family: 'Nunito', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: #333;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .option-btn:hover:not(:disabled) {
      border-color: #4d96ff;
      background: #eef4ff;
      transform: translateX(4px);
    }

    .option-btn .opt-letter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #e8e8f0;
      font-size: 0.85rem;
      font-weight: 800;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }

    .option-btn:hover:not(:disabled) .opt-letter {
      background: #4d96ff;
      color: white;
    }

    /* States */
    .option-btn.correct {
      border-color: #6bcb77;
      background: #efffef;
      animation: correctPop 0.3s ease;
    }

    .option-btn.correct .opt-letter {
      background: #6bcb77;
      color: white;
    }

    .option-btn.wrong {
      border-color: #ff4d4d;
      background: #fff0f0;
      animation: shake 0.4s ease;
    }

    .option-btn.wrong .opt-letter {
      background: #ff4d4d;
      color: white;
    }

    .option-btn:disabled { cursor: default; }
    .option-btn { -webkit-tap-highlight-color: transparent; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%  { transform: translateX(-8px); }
      40%  { transform: translateX(8px); }
      60%  { transform: translateX(-5px); }
      80%  { transform: translateX(5px); }
    }

    @keyframes correctPop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.03); }
      100% { transform: scale(1); }
    }

    /* Feedback toast */
    .feedback {
      margin-top: 18px;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1rem;
      text-align: center;
      opacity: 0;
      transition: opacity 0.2s;
      min-height: 48px;
    }

    .feedback.show { opacity: 1; }
    .feedback.correct-fb { background: #efffef; color: #3aaa4a; }
    .feedback.wrong-fb   { background: #fff0f0; color: #cc2222; }

    /* ── Result Screen ── */
    .result-screen {
      display: none;
      text-align: center;
    }

    .result-screen.show { display: block; }

    .bollywood-age {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(5rem, 18vw, 9rem);
      line-height: 1;
      background: linear-gradient(135deg, #ff4d8b, #ffd93d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 16px 0;
      animation: agePop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes agePop {
      from { transform: scale(0.3); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .result-title {
      font-family: 'Fredoka One', cursive;
      font-size: 1.5rem;
      color: #555;
      margin-bottom: 4px;
    }

    .result-subtitle {
      font-size: 0.95rem;
      color: #888;
      margin-bottom: 24px;
    }

    .result-verdict {

      line-height: 1.7;
      background: #f8f8ff;
      border-radius: 18px;
      padding: 22px 24px;
      margin-bottom: 28px;
    }

    .score-breakdown {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 28px;
    }

    .score-box {
      text-align: center;
    }

    .score-box .big {
      font-family: 'Fredoka One', cursive;
      font-size: 2.4rem;
      display: block;
    }

    .score-box .small {
      font-size: 0.8rem;
      font-weight: 800;
      text-transform: uppercase;
      color: #999;
      letter-spacing: 0.5px;
    }

    .score-box.wrong-box .big   { color: #ff6b6b; }

    .play-again-btn {
      background: linear-gradient(135deg, #ff6b9d, #ffd93d);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 16px 44px;

    }

    .play-again-btn:hover {
      transform: translateY(-3px);

const VERDICTS = [
  "Zero correct. ZERO. Bollywood age: 84. You are not a person, you are a Wikipedia stub. Are you even Indian?",
  "One correct. ONE. Bollywood age 79. You are a Bollywood fossil. A relic. A cautionary tale told to children who skip film studies.",
  "Two correct. Bollywood age 74. Bobby Deol sat silently through an entire film and still contributed more to Bollywood than this score.",
  "Three out of ten. Bollywood age 69. Retirement age. Even your Bollywood knowledge has filed for a pension and moved to Pune.",
  "Four correct. Bollywood age 64 — vintage, a collector's item, and completely unwatchable on a Friday night.",
  "Five out of ten. Bollywood age 59. Halfway through the quiz and halfway to being irrelevant. This is what happens when you stop watching films.",
  "Six correct. Bollywood age 54. At this point Salman Khan has more hit films than you have correct answers. And he tries very hard.",
  "Seven out of ten. Bollywood age 49. One year from fifty, which is fitting, because you're about one rewatch away from knowing your stuff.",
  "Eight correct. Bollywood age 44. Solid effort, but 44 is not 34. You are ten years too old in Bollywood terms. Karan Johar is mildly disappointed.",
  "Nine out of ten! Bollywood age 39. So close to your actual age. One question aged you five years — hope it was worth it.",
  "PERFECT SCORE. Bollywood age: 34. Exactly right. Exactly you. The quiz is balanced, you are balanced. Now go watch a film to celebrate."
];

// ── State ─────────────────────────────────────────────────────────
let QUESTIONS  = [];
let current    = 0;
let score      = 0;
let answered   = false;
let firstTried = true;

function pickQuestions() {
  const shuffled = [...ALL_QUESTIONS].sort(() => Math.random() - 0.5);
  QUESTIONS = shuffled.slice(0, 10);
}

// ── Render ────────────────────────────────────────────────────────
const LETTERS = ['A', 'B', 'C', 'D'];

function renderQuestion() {
  const q = QUESTIONS[current];
  firstTried = true;
  answered   = false;
  if (document.activeElement) document.activeElement.blur();

  document.getElementById('progressLabel').textContent = `Question ${current + 1} of 10`;
  document.getElementById('scoreLabel').textContent    = `✓ ${score} correct`;
  document.getElementById('progressFill').style.width  = `${(current / 10) * 100}%`;
  document.getElementById('questionNum').textContent   = `Q${current + 1}`;
  document.getElementById('questionText').textContent  = q.q;

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';

  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-letter">${LETTERS[i]}</span> ${opt}`;
    btn.addEventListener('click', () => handleAnswer(i, btn));
    container.appendChild(btn);
  });

  clearFeedback();
}

function handleAnswer(index, btn) {
  if (answered) return;

  const q       = QUESTIONS[current];
  const correct = index === q.ans;
  const allBtns = document.querySelectorAll('.option-btn');

  if (correct) {
    answered = true;
    btn.classList.add('correct');
    allBtns.forEach(b => b.disabled = true);

    if (firstTried) {
      score++;
      document.getElementById('scoreLabel').textContent = `✓ ${score} correct`;
      showFeedback('correct', '✅ Correct! Well done.');
    } else {
      showFeedback('correct', '✅ Correct! (Better late than never...)');
    }

    setTimeout(() => {
      current++;
      if (current < 10) {
        renderQuestion();
      } else {
        showResult();
      }
    }, 1100);

  } else {
    firstTried = false;
    btn.classList.add('wrong');
    btn.disabled = true;
    showFeedback('wrong', '❌ Nope. Try again.');
    setTimeout(() => btn.classList.remove('wrong'), 500);
  }
}

function showFeedback(type, msg) {
  const el = document.getElementById('feedback');
  el.className = `feedback show ${type === 'correct' ? 'correct-fb' : 'wrong-fb'}`;
  el.textContent = msg;
}

function clearFeedback() {
  const el = document.getElementById('feedback');
  el.className = 'feedback';
  el.textContent = '';
}

// ── Result ────────────────────────────────────────────────────────
function showResult() {
  document.getElementById('quizBody').style.display = 'none';
  const result = document.getElementById('resultScreen');
  result.classList.add('show');

  const bollywoodAge = 84 - (5 * score);
  const excess       = bollywoodAge - 34;

  document.getElementById('bollywoodAge').textContent  = bollywoodAge;
  document.getElementById('finalCorrect').textContent  = score;
  document.getElementById('finalWrong').textContent    = 10 - score;
  document.getElementById('resultVerdict').textContent = VERDICTS[score];

  const subtitle = score === 10
    ? `${score}/10 — Perfect score. Exactly 34. You've earned it.`
    : `${score}/10 — ${excess} year${excess === 1 ? '' : 's'} older than your actual age of 34.`;
  document.getElementById('resultSubtitle').textContent = subtitle;

  launchConfetti();
  document.getElementById('progressFill').style.width = '100%';
}

function resetQuiz() {
  current  = 0;
  score    = 0;
  answered = false;

  pickQuestions();
  document.getElementById('quizBody').style.display = '';
  document.getElementById('resultScreen').classList.remove('show');
  renderQuestion();
}

// ── Confetti ──────────────────────────────────────────────────────
const canvas = document.getElementById('confetti');
const ctx    = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const COLORS = ['#ff6b9d','#ffd93d','#6bcb77','#4d96ff','#ff6348','#a29bfe','#fd79a8','#fdcb6e'];

class Piece {
  constructor(fromTop) {
    this.reset(fromTop);
  }
  reset(fromTop) {
    this.x        = Math.random() * canvas.width;
    this.y        = fromTop ? -20 : Math.random() * -canvas.height;
    this.size     = Math.random() * 10 + 5;
    this.color    = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.speedY   = Math.random() * 3 + 1.5;
    this.speedX   = (Math.random() - 0.5) * 2;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.15;
    this.opacity  = Math.random() * 0.5 + 0.5;
    this.isRect   = Math.random() > 0.4;
  }
  update() {
    this.y        += this.speedY;
    this.x        += this.speedX;
    this.rotation += this.rotSpeed;
    if (this.y > canvas.height + 20) this.reset(false);
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.opacity;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.fillStyle = this.color;
    if (this.isRect) {
      ctx.fillRect(-this.size / 2, -this.size / 4, this.size, this.size / 2);
    } else {
      ctx.beginPath();
      ctx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

let ambient = Array.from({ length: 60 }, () => new Piece(false));
let burst   = [];

function launchConfetti() {
  burst.push(...Array.from({ length: 140 }, () => new Piece(true)));
}

(function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  [...ambient, ...burst].forEach(p => { p.update(); p.draw(); });
  burst = burst.filter(p => p.y < canvas.height + 20);
  requestAnimationFrame(loop);
})();

// ── Init ──────────────────────────────────────────────────────────
pickQuestions();
renderQuestion();
</script>
